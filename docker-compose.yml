version: "3.9"

services:
  # ── PostgreSQL with pgvector ─────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: bunker_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bunker
    ports:
      - "5432:5432"
    volumes:
      - bunker_db_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + caching) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bunker_redis
    ports:
      - "6379:6379"
    volumes:
      - bunker_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bunker_backend
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/bunker
      - DATABASE_URL_SYNC=postgresql+psycopg2://postgres:password@db:5432/bunker
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  bunker_db_data:
  bunker_redis_data:
